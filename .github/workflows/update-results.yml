name: Update Results from API

on:
  schedule:
    - cron: '0 * * * *'   # Every hour
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Fetch results from football-data.org
        env:
          FOOTBALL_API_KEY: ${{ secrets.FOOTBALL_API_KEY }}
        run: node scripts/fetch-results.js

      - name: Commit updated results
        run: |
          git config user.email "bot@github.com"
          git config user.name "Results Bot"
          git add public/data/results.json public/data/matches.json
          git diff --staged --quiet || (git commit -m "chore: update results [skip ci]" && git push)
